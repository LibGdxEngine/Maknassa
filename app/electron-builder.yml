appId: com.maknassa.app
productName: Maknassa
directories:
  output: ../dist/electron
npmRebuild: false
files:
  - out/**/*
extraResources:
  - from: ../dist/maknassa-backend
    to: backend
    filter:
      - "**/*"
# Linux is built as a bare dir; packaging/linux/build_appimage.sh packs it with
# appimagetool's static runtime (electron-builder's AppImage runtime needs libfuse2).
linux:
  target:
    - dir
  icon: ../packaging/icons/maknassa.png
win:
  target:
    - nsis
  icon: ../packaging/icons/maknassa.ico
  signAndEditExecutable: false
  artifactName: Maknassa-Setup.exe
mac:
  target:
    - dmg
  icon: ../packaging/icons/maknassa.icns
  artifactName: Maknassa.dmg
