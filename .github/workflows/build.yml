name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      MAKNASSA_DEV: "1"  # tests/mypy don't need a licence key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install app + dev/build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,build]"

      - name: Test and type-check
        run: |
          pytest -q
          mypy reactions/
        # Unit tests are fully mocked, so no real browser install is needed here;
        # the browser is installed into the bundle by the build step below.

      - name: Build desktop bundle (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash packaging/build.sh

      - name: Build desktop bundle (Windows)
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File packaging/build.ps1

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: maknassa-${{ matrix.os }}
          path: dist/maknassa
          if-no-files-found: error

# Deferred for the MVP (add before a public launch):
#   * Windows Authenticode signing  -> avoids SmartScreen "unknown publisher"
#   * macOS codesign + notarization -> avoids Gatekeeper "unidentified developer"
#   * Installers: Inno Setup (.exe) / DMG (macOS) / AppImage (Linux)
# Until then these artifacts are unsigned; ship install notes covering the OS
# "open anyway" bypass for early users.
