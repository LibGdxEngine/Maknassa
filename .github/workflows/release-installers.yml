name: release-installers

# Builds the one-click installers on GitHub's cloud runners and attaches them to a
# GitHub Release. Each installer is an Electron shell with the PyInstaller-frozen
# Python backend (and its Playwright Chromium) embedded as a resource:
#   * Windows  -> Maknassa-Setup.exe   (electron-builder NSIS)
#   * macOS    -> Maknassa.dmg         (electron-builder .app + Chromium injection +
#                                       ad-hoc deep-sign + hdiutil) on Apple Silicon.
#                                       Intel Macs need a separate macos-13 build
#                                       (GitHub's Intel runners are backlogged).
#   * Linux    -> Maknassa.AppImage    (electron-builder AppImage)
#
# Trigger it two ways:
#   * Push a tag like v1.0.0           -> builds and attaches to that tag's release.
#   * Run it by hand (Actions tab or `gh workflow run`) with a `tag` input -> attaches
#     to an existing release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the installers to"
        required: true
        default: "v1.0.0"

permissions:
  contents: write   # required so the workflow can upload assets to the Release

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: dist/Maknassa-Setup.exe
          - os: macos-latest      # Apple Silicon (arm64)
            asset: dist/Maknassa.dmg
          - os: ubuntu-latest
            asset: dist/Maknassa.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      # ---- Linux ----
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: bash packaging/build.sh

      # ---- macOS ----
      - name: Build app (macOS)
        if: runner.os == 'macOS'
        run: bash packaging/build.sh
      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: bash packaging/macos/build_dmg.sh

      # ---- Windows ----
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File packaging/build.ps1

      - name: Show built asset
        shell: bash
        run: ls -lh "${{ matrix.asset }}"

      - name: Attach installer to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
